<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sara Bags - Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #000; color: white; border: none; cursor: pointer; }
        .delete-btn { background: #ff4444; margin-top: 10px; }
        .product-item { border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>
    <h1>Sara Bags Admin</h1>
    
    <div class="card">
        <h3>Add New Product</h3>
        <input type="text" id="p-name" placeholder="Product Name">
        <input type="number" id="p-price" placeholder="Price (AED)">
        <select id="p-cat">
            <option value="Clasp">Clasp</option>
            <option value="Wristlet">Wristlet</option>
            <option value="Clutch">Clutch</option>
            <option value="Canvas">Canvas</option>
        </select>
        <input type="text" id="p-img" placeholder="Image Key (e.g. orange_clasp)">
        <button onclick="addProduct()">Add Product</button>
    </div>

    <div class="card">
        <h3>Active Offers</h3>
        <input type="text" id="promo-code" placeholder="Code (e.g. SUMMER20)">
        <input type="number" id="promo-disc" placeholder="Discount Value">
        <select id="promo-type">
            <option value="percent">Percentage (%)</option>
            <option value="fixed">Fixed Amount</option>
        </select>
        <button onclick="addPromo()">Create Offer</button>
        <div id="promo-list"></div>
    </div>

    <div class="card">
        <h3>Manage Inventory</h3>
        <div id="inventory-list"></div>
    </div>

    <script>
        const API = 'https://sarabags-production.up.railway.app/api';
        const ADMIN_KEY = prompt("Enter Admin Key:");

        const headers = { 
            'Content-Type': 'application/json',
            'x-admin-key': ADMIN_KEY 
        };

        async function loadData() {
            // Load Products
            const pRes = await fetch(`${API}/products`);
            const products = await pRes.json();
            document.getElementById('inventory-list').innerHTML = products.map(p => `
                <div class="product-item">
                    <strong>${p.name}</strong> - ${p.price} AED
                    <button class="delete-btn" onclick="deleteItem('products', ${p.id})">Remove</button>
                </div>
            `).join('');

            // Load Promos
            const prRes = await fetch(`${API}/promos/all`, { headers });
            const promos = await prRes.json();
            document.getElementById('promo-list').innerHTML = promos.map(p => `
                <div class="product-item">
                    ${p.code} (${p.discount}${p.type === 'percent' ? '%' : ' AED'})
                    <button class="delete-btn" onclick="deleteItem('promos', ${p.id})">Remove Code</button>
                </div>
            `).join('');
        }

        async function addProduct() {
            const body = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                category: document.getElementById('p-cat').value,
                image_key: document.getElementById('p-img').value,
                active: 1
            };
            await fetch(`${API}/products`, { method: 'POST', headers, body: JSON.stringify(body) });
            loadData();
        }

        async function addPromo() {
            const body = {
                code: document.getElementById('promo-code').value,
                discount: parseFloat(document.getElementById('promo-disc').value),
                type: document.getElementById('promo-type').value
            };
            await fetch(`${API}/promos`, { method: 'POST', headers, body: JSON.stringify(body) });
            loadData();
        }

        async function deleteItem(type, id) {
            if(confirm('Are you sure?')) {
                await fetch(`${API}/${type}/${id}`, { method: 'DELETE', headers });
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
